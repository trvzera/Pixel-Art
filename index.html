        <div class="pen" aria-label="Definir cor rosa" onclick="setPenColor('var(--pink)', this)"></div>
        <div class="pen" aria-label="Definir cor roxa" onclick="setPenColor('var(--purple)', this)"></div>
      </div>
      <input id="colorPicker" type="color" onchange="setPenColor(this.value, this)">
